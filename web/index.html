<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Harshit Kumawat — Flutter developer portfolio.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Harshit Kumawat">
  <link rel="apple-touch-icon" href="avatar.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="avatar.png"/>

  <title>Harshit Kumawat</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; background: #07070E; }
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #07070E; transition: opacity .55s ease;
    }
    #splash .mono {
      width: 84px; height: 84px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 800; font-size: 38px; color: #fff;
      background: linear-gradient(135deg, #7C5CFF, #FF5C8A 50%, #2DD4FF);
      box-shadow: 0 14px 44px rgba(124,92,255,.35);
    }
    #splash .bar {
      width: 180px; height: 2px; margin-top: 28px; border-radius: 2px;
      background: rgba(255,255,255,.12); overflow: hidden;
    }
    #splash .bar > i {
      display: block; height: 100%; width: 40%; border-radius: 2px;
      background: linear-gradient(90deg, #7C5CFF, #2DD4FF);
      animation: hkload 1.15s ease-in-out infinite;
    }
    @keyframes hkload {
      0%   { transform: translateX(-130%); }
      100% { transform: translateX(330%); }
    }
    #splash .cap {
      margin-top: 16px; color: #6B6B80;
      font-family: ui-monospace, monospace;
      font-size: 12px; letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="mono">HK</div>
    <div class="bar"><i></i></div>
    <div class="cap">harshit kumawat</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(function () { s.remove(); }, 600); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
